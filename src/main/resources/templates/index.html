<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments Application</title>
    <link href="style.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; background-color: #f8f9fa; }
        .container { max-width: 800px; margin: 40px auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #343a40; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th { background-color: #343a40; color: white; padding: 10px; }
        td { padding: 8px 10px; border-bottom: 1px solid #dee2e6; }
        tr:hover { background-color: #f1f1f1; }
        input[type=text] { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ced4da; border-radius: 4px; }
        button { background-color: #007bff; color: white; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
<div class="container">
  <h1>Welcome to the comments application!</h1>
  <!-- table of comments-->
   <table class="table">
    <thead>
      <tr>
        <th scope="col">ID</th>
        <th scope="col">Content</th>
        <th scope="col">Author</th>
        <th scope="col">Timestamp</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="comment : ${comments}">
        <td th:text="${comment.id}">1</td>
        <td th:text="${comment.content}">Sample comment content</td>
        <td th:text="${comment.author}">Author Name</td>
        <td th:text="${comment.timestamp}">2024-01-01T00:00:00</td>
      </tr>
    </tbody>

    </table>

    <!-- search form -->
    <form th:action="@{/search}" method="get" style="margin-bottom: 20px;">
      <div class="mb-3">
        <label for="searchTerm" class="form-label">Search Comments</label>
        <input type="text" class="form-control" id="searchTerm" name="searchTerm" placeholder="Search by content or author">
      </div>
      <button type="submit">Search</button>
      <a href="/"><button type="button" style="margin-left:8px;">Clear</button></a>
    </form>

    <!-- form to add comments   -->
    <form th:action="@{/submitComment}" method="post">
      <div class="mb-3">
        <label for="content" class="form-label">New Comment</label>
        <input type="text" class="form-control" id="content" name="content" required>
      </div>
        <div class="mb-3">
        <label for="author" class="form-label">Your name</label>
        <input type="text" class="form-control" id="author" name="author" required>
      </div>
      <button type="submit" class="btn btn-primary">Add Comment</button>
    </form>
 

</body>
</html>
